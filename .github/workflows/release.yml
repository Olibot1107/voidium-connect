name: Build and release

on:
  push:
    branches:
      - main
  workflow_dispatch: {}

jobs:
  build:
    name: Build and release VSIX
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v5
        with:
          node-version: 20

      - name: Cache node modules
        uses: actions/cache@v4
        with:
          path: ~/.npm
          key: npm-${{ runner.os }}-${{ hashFiles('package-lock.json') }}

      - name: Install dependencies
        run: npm ci

      - name: Compile extension
        run: npm run bundle

      - name: Pack VSIX
        run: npm run pack

      - name: Set release date version
        id: version
        run: |
          VERSION=$(date -u +"%Y.%m.%d")
          echo "version=$VERSION" >> $GITHUB_OUTPUT

      - name: Ensure release exists
        id: ensure_release
        uses: actions/github-script@v7
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}
          script: |
            const tag = `v${{ steps.version.outputs.version }}`

            try {
              const release = await github.rest.repos.getReleaseByTag({
                owner: context.repo.owner,
                repo: context.repo.repo,
                tag
              })

              core.setOutput("exists", "true")
              core.setOutput("upload_url", release.data.upload_url)
            } catch (error) {
              if (error.status === 404) {
                core.setOutput("exists", "false")
                return
              }
              throw error
            }

      - name: Create GitHub release
        id: release
        if: steps.ensure_release.outputs.exists != 'true'
        uses: actions/create-release@v1
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          tag_name: v${{ steps.version.outputs.version }}
          release_name: v${{ steps.version.outputs.version }}
          draft: false
          prerelease: false

      - name: Upload VSIX asset
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          TAG=v${{ steps.version.outputs.version }}
          gh release upload "$TAG" ./out/pterodactyl-vsc.vsix --clobber
